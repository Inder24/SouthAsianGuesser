<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Image Load Test</title>
  </head>
  <body>
    <pre id="out">Loading...</pre>
    <canvas id="canvas" width="640" height="360"></canvas>
    <script type="module">
      import { GAME_ROUNDS } from "./game-rounds.js?v=catalog-1";

      const out = document.querySelector("#out");
      const canvas = document.querySelector("#canvas");
      const ctx = canvas.getContext("2d");
      const results = [];

      for (const round of GAME_ROUNDS) {
        results.push(await new Promise((resolve) => {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.onload = () => {
            ctx.drawImage(img, 0, 0, 640, 360);
            resolve({ id: round.id, ok: true, width: img.width, height: img.height });
          };
          img.onerror = () => resolve({ id: round.id, ok: false, url: round.imageUrl });
          img.src = round.imageUrl;
        }));
      }

      out.textContent = JSON.stringify(results, null, 2);
    </script>
  </body>
</html>
