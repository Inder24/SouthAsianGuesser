<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GrabMaps Street View SDK Test</title>
    <script src="./config.local.js"></script>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f7f5;
        color: #0b1f18;
      }

      main {
        max-width: 760px;
        margin: 40px auto;
        padding: 24px;
        background: white;
        border: 1px solid #d7e2de;
        border-radius: 8px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 28px;
      }

      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        background: #10221b;
        color: #d8fff0;
        padding: 16px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GrabMaps Street View SDK Test</h1>
      <p id="status">Testing Orchard Road, Singapore...</p>
      <pre id="output">Waiting for SDK...</pre>
    </main>

    <script type="module">
      import { GrabMapsBuilder } from "https://maps.grab.com/developer/assets/js/grabmaps.es.js";

      const API_KEY = window.GRABMAPS_API_KEY || "";
      const TEST_LOCATION = {
        name: "Orchard Road, Singapore",
        lat: 1.3048,
        lng: 103.8318
      };

      const status = document.querySelector("#status");
      const output = document.querySelector("#output");

      function timeout(promise, ms) {
        return Promise.race([
          promise,
          new Promise((_, reject) => {
            window.setTimeout(() => reject(new Error(`Timed out after ${ms}ms`)), ms);
          })
        ]);
      }

      async function testBaseUrl(baseUrl, useOuterTimeout) {
        const client = new GrabMapsBuilder()
          .setBaseUrl(baseUrl)
          .setApiKey(API_KEY)
          .setTimeout(15000)
          .build();

        const startedAt = performance.now();
        const sdkPromise = client.streetView.findNearbyPhotos(TEST_LOCATION.lat, TEST_LOCATION.lng, {
          limit: 10,
          radius: 1200,
          projection: "SPHERE"
        });
        const result = useOuterTimeout ? await timeout(sdkPromise, 10000) : await sdkPromise;

        const photos = Array.isArray(result) ? result : result?.result?.data || result?.photos || result?.data || [];
        return {
          baseUrl,
          useOuterTimeout,
          elapsedMs: Math.round(performance.now() - startedAt),
          photoCount: photos.length,
          firstPhoto: photos[0] || null,
          rawType: Array.isArray(result) ? "array" : typeof result
        };
      }

      try {
        const tests = [];
        for (const [baseUrl, useOuterTimeout] of [
          ["https://maps.grab.com", true],
          ["https://maps.grab.com", false],
          ["https://maps.grab.com/api/v1", true],
          ["https://maps.grab.com/api/v1", false]
        ]) {
          try {
            tests.push(await testBaseUrl(baseUrl, useOuterTimeout));
          } catch (error) {
            tests.push({
              baseUrl,
              useOuterTimeout,
              error: error.message,
              stack: error.stack
            });
          }
        }

        const best = tests.find((test) => test.photoCount > 0);
        status.textContent = best
          ? `Success: found ${best.photoCount} photo(s) near ${TEST_LOCATION.name}.`
          : `No photos returned near ${TEST_LOCATION.name}.`;
        output.textContent = JSON.stringify({
          location: TEST_LOCATION,
          tests
        }, null, 2);
      } catch (error) {
        status.textContent = `SDK street-view lookup failed near ${TEST_LOCATION.name}.`;
        output.textContent = JSON.stringify({
          location: TEST_LOCATION,
          error: error.message,
          stack: error.stack
        }, null, 2);
      }
    </script>
  </body>
</html>
